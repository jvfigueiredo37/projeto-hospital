<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitor Saúde Pública — Campinas/SP</title>
<meta name="description" content="Monitoramento das unidades de saúde pública de Campinas em mapa real — CNES/DataSUS.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #020617;
  --surface: rgba(15, 23, 42, 0.85);
  --surface2: rgba(30, 41, 59, 0.7);
  --stroke: rgba(148, 163, 184, 0.12);
  --stroke2: rgba(148, 163, 184, 0.22);
  --text: #f1f5f9;
  --text2: #94a3b8;
  --text3: #475569;
  --green: #4ade80;
  --green-bg: rgba(74,222,128,0.12);
  --amber: #fbbf24;
  --amber-bg: rgba(251,191,36,0.12);
  --red: #f87171;
  --red-bg: rgba(248,113,113,0.12);
  --blue: #38bdf8;
  --hospital: #f43f5e;
  --upa: #f59e0b;
  --ubs: #10b981;
  --other: #8b5cf6;
  --r: 12px;
  --r-sm: 8px;
}

html, body { height: 100%; }

body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

/* LAYOUT PRINCIPAL — sidebar + mapa */
.layout {
  display: flex;
  height: 100vh;
  width: 100vw;
}

/* SIDEBAR */
.sidebar {
  width: 380px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  background: var(--bg);
  border-right: 1px solid var(--stroke);
  z-index: 1000;
  overflow: hidden;
}

.sidebar-inner {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: rgba(148,163,184,0.15) transparent;
}
.sidebar-inner::-webkit-scrollbar { width: 4px; }
.sidebar-inner::-webkit-scrollbar-thumb { background: rgba(148,163,184,0.15); border-radius: 2px; }

/* HEADER */
.s-header {
  padding: 1.25rem 1.25rem 1rem;
  border-bottom: 1px solid var(--stroke);
  flex-shrink: 0;
}
.s-header h1 {
  font-size: 1rem; font-weight: 800; letter-spacing: -0.03em;
  background: linear-gradient(to right, #fff 30%, #64748b);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  margin-bottom: 0.2rem;
}
.s-header p { font-size: 0.7rem; color: var(--text3); }
.live-row {
  display: flex; align-items: center; justify-content: space-between; margin-top: 0.75rem;
}
.live-pill {
  display: flex; align-items: center; gap: 0.5rem;
  background: var(--surface2); border: 1px solid var(--stroke);
  padding: 0.3rem 0.75rem; border-radius: 99px;
  font-size: 0.7rem; font-weight: 600; color: var(--text2);
}
.pulse {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--green); box-shadow: 0 0 8px rgba(74,222,128,0.7);
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }
.cnes-chip {
  font-size: 0.65rem; color: var(--blue);
  background: rgba(56,189,248,0.1); border: 1px solid rgba(56,189,248,0.2);
  padding: 0.2rem 0.6rem; border-radius: 99px;
}

/* METRICS */
.metrics {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 0.625rem; padding: 1rem 1.25rem;
  border-bottom: 1px solid var(--stroke);
}
.mc {
  background: var(--surface2); border: 1px solid var(--stroke);
  border-radius: var(--r-sm); padding: 0.875rem;
}
.mc-lbl { font-size: 0.625rem; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 0.4rem; }
.mc-val { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.04em; line-height: 1; }
.mc-sub { font-size: 0.625rem; color: var(--text3); margin-top: 0.25rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* BEST CARD */
.best-card {
  margin: 1rem 1.25rem;
  background: linear-gradient(135deg, rgba(74,222,128,0.13), rgba(16,185,129,0.04));
  border: 1px solid rgba(74,222,128,0.28);
  border-radius: var(--r); padding: 1rem 1.125rem;
  position: relative; overflow: hidden;
}
.best-card::after {
  content:''; position:absolute; top:-50px; right:-50px;
  width:130px; height:130px; border-radius:50%;
  background:var(--green); filter:blur(70px); opacity:0.1; pointer-events:none;
}
.best-hdr { display:flex; align-items:center; gap:0.4rem; margin-bottom:0.625rem; }
.best-hdr svg { width:12px; height:12px; color:var(--green); }
.best-lbl { font-size:0.6rem; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; color:var(--green); }
.best-name { font-size:0.9375rem; font-weight:700; letter-spacing:-0.02em; margin-bottom:0.15rem; line-height:1.3; }
.best-type { font-size:0.7rem; color:var(--text2); margin-bottom:0.75rem; }
.best-stats { display:grid; grid-template-columns:1fr 1fr; gap:0.5rem; }
.bst { background:rgba(0,0,0,0.3); border-radius:var(--r-sm); padding:0.625rem 0.75rem; border:1px solid rgba(255,255,255,0.04); }
.bst-lbl { font-size:0.6rem; color:var(--text3); margin-bottom:0.2rem; }
.bst-val { font-size:1.1rem; font-weight:700; }

/* FILTERS */
.filter-section { padding: 0.875rem 1.25rem 0.625rem; border-bottom: 1px solid var(--stroke); }
.filter-lbl { font-size:0.65rem; font-weight:700; text-transform:uppercase; letter-spacing:0.07em; color:var(--text3); margin-bottom:0.5rem; }
.filter-row { display:flex; gap:0.375rem; flex-wrap:wrap; }
.fbtn {
  display:flex; align-items:center; gap:0.4rem;
  background:rgba(255,255,255,0.03); border:1px solid var(--stroke);
  color:var(--text2); padding:0.3rem 0.75rem;
  border-radius:99px; font-size:0.75rem; font-weight:500;
  cursor:pointer; transition:all 0.12s; font-family:inherit;
}
.fbtn:hover { background:rgba(255,255,255,0.07); color:var(--text); }
.fbtn.on { background:var(--blue); color:#01111f; border-color:var(--blue); font-weight:700; }
.fbtn.on .fdot { background:#01111f !important; }
.fdot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }

/* RANKING */
.rank-section { flex:1; }
.rank-hdr {
  display:flex; align-items:center; justify-content:space-between;
  padding:0.75rem 1.25rem 0.375rem;
}
.rank-title { font-size:0.8125rem; font-weight:700; }
.sort-row { display:flex; gap:0.3rem; }
.sbtn {
  font-size:0.7rem; font-family:inherit;
  background:rgba(255,255,255,0.04); border:1px solid var(--stroke);
  color:var(--text2); padding:0.2rem 0.625rem; border-radius:99px; cursor:pointer;
  transition:all 0.12s;
}
.sbtn:hover { color:var(--text); background:rgba(255,255,255,0.07); }
.sbtn.on { background:rgba(56,189,248,0.12); border-color:rgba(56,189,248,0.3); color:var(--blue); }

.rank-list { display:flex; flex-direction:column; }
.ri {
  display:flex; align-items:center; gap:0.75rem;
  padding:0.75rem 1.25rem; border-bottom:1px solid rgba(255,255,255,0.03);
  cursor:pointer; transition:background 0.1s;
}
.ri:hover { background:rgba(255,255,255,0.025); }
.ri.active-item { background:rgba(56,189,248,0.07); }
.ri:last-child { border-bottom:none; }
.ri-num { font-size:0.7rem; font-weight:700; color:var(--text3); width:16px; text-align:center; flex-shrink:0; }
.ri-icon { width:36px; height:36px; border-radius:var(--r-sm); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.ri-info { flex:1; min-width:0; }
.ri-name { font-size:0.8rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ri-sub { font-size:0.65rem; color:var(--text3); margin-top:0.1rem; }
.occ-bar { height:2px; background:rgba(255,255,255,0.06); border-radius:1px; margin-top:0.35rem; overflow:hidden; }
.occ-fill { height:100%; border-radius:1px; transition:width 0.5s; }
.ri-badge { flex-shrink:0; font-size:0.75rem; font-weight:700; padding:0.25rem 0.6rem; border-radius:var(--r-sm); }
.bg { background:var(--green-bg); color:var(--green); }
.ba { background:var(--amber-bg); color:var(--amber); }
.br { background:var(--red-bg); color:var(--red); }

/* PAGINATION */
.pgn {
  display:flex; align-items:center; justify-content:space-between;
  padding:0.625rem 1.25rem; border-top:1px solid var(--stroke);
  font-size:0.7rem; color:var(--text3);
}
.pb {
  font-size:0.7rem; font-family:inherit;
  background:rgba(255,255,255,0.04); border:1px solid var(--stroke);
  color:var(--text2); padding:0.25rem 0.625rem; border-radius:var(--r-sm); cursor:pointer;
  transition:all 0.12s;
}
.pb:hover:not(:disabled) { background:rgba(255,255,255,0.08); color:var(--text); }
.pb:disabled { opacity:0.3; cursor:default; }

/* MAP */
#map {
  flex: 1;
  height: 100vh;
  z-index: 1;
}

/* Leaflet dark overrides */
.leaflet-tile-pane { filter: brightness(0.5) saturate(0.4) hue-rotate(185deg); }
.leaflet-control-zoom { display:none; }
.leaflet-attribution-flag { display:none !important; }
.leaflet-control-attribution {
  background: rgba(2,6,23,0.85) !important;
  color: rgba(148,163,184,0.5) !important;
  font-size: 9px !important;
  border-radius: 4px 0 0 0 !important;
}
.leaflet-control-attribution a { color: rgba(56,189,248,0.6) !important; }

/* Custom popup */
.custom-popup .leaflet-popup-content-wrapper {
  background: #0f172a;
  border: 1px solid rgba(148,163,184,0.15);
  border-radius: 12px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.6);
  padding: 0;
  overflow: hidden;
}
.custom-popup .leaflet-popup-tip-container { display:none; }
.custom-popup .leaflet-popup-content { margin:0; width:240px !important; }
.popup-inner { padding:1rem; }
.popup-name { font-size:0.875rem; font-weight:700; color:#f1f5f9; line-height:1.3; margin-bottom:0.5rem; }
.popup-row { display:flex; justify-content:space-between; align-items:center; padding:0.2rem 0; font-size:0.75rem; }
.popup-lbl { color:#475569; }
.popup-val { color:#94a3b8; font-weight:500; }
.popup-wait { font-size:1rem; font-weight:800; }
.popup-divider { border-top:1px solid rgba(255,255,255,0.06); margin:0.5rem 0; }
.popup-footer { background:rgba(0,0,0,0.3); padding:0.5rem 1rem; font-size:0.65rem; color:#475569; }

/* Responsive — mobile: mapa em cima, sidebar embaixo */
@media (max-width: 768px) {
  body { overflow: auto; }
  .layout { flex-direction: column; height: auto; overflow: auto; }
  .sidebar { width: 100%; height: auto; overflow: visible; border-right: none; border-bottom: 1px solid var(--stroke); }
  .sidebar-inner { overflow: visible; }
  #map { height: 55vw; min-height: 280px; flex: none; }
}
</style>
</head>
<body>
<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="s-header">
      <h1>Monitor Saúde — Campinas/SP</h1>
      <p>Rede SUS · Ministério da Saúde · IBGE 350950</p>
      <div class="live-row">
        <div class="live-pill"><div class="pulse"></div><span id="clock">--:--</span>&nbsp;· ao vivo</div>
        <span class="cnes-chip">CNES / DataSUS</span>
      </div>
    </div>

    <div class="sidebar-inner">

      <div class="metrics">
        <div class="mc">
          <div class="mc-lbl">Unidades</div>
          <div class="mc-val" id="m-total">—</div>
          <div class="mc-sub">cadastradas CNES</div>
        </div>
        <div class="mc">
          <div class="mc-lbl">Urgência 24h</div>
          <div class="mc-val" id="m-urg" style="color:var(--red)">—</div>
          <div class="mc-sub">hospitais e UPAs</div>
        </div>
        <div class="mc">
          <div class="mc-lbl">Menor espera</div>
          <div class="mc-val" id="m-best" style="color:var(--green)">—</div>
          <div class="mc-sub" id="m-best-n">—</div>
        </div>
        <div class="mc">
          <div class="mc-lbl">Maior espera</div>
          <div class="mc-val" id="m-worst" style="color:var(--amber)">—</div>
          <div class="mc-sub" id="m-worst-n">—</div>
        </div>
      </div>

      <div class="best-card">
        <div class="best-hdr">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          <span class="best-lbl">Melhor opção agora</span>
        </div>
        <div class="best-name" id="b-name">—</div>
        <div class="best-type" id="b-type">—</div>
        <div class="best-stats">
          <div class="bst"><div class="bst-lbl">Espera estimada</div><div class="bst-val" id="b-wait" style="color:var(--green)">—</div></div>
          <div class="bst"><div class="bst-lbl">Na fila agora</div><div class="bst-val" id="b-queue">—</div></div>
        </div>
      </div>

      <div class="filter-section">
        <div class="filter-lbl">Filtrar por tipo</div>
        <div class="filter-row" id="filters">
          <button class="fbtn on" data-t="all">Todos</button>
          <button class="fbtn" data-t="hospital"><span class="fdot" style="background:var(--hospital)"></span>Hospital</button>
          <button class="fbtn" data-t="upa"><span class="fdot" style="background:var(--upa)"></span>UPA 24h</button>
          <button class="fbtn" data-t="ubs"><span class="fdot" style="background:var(--ubs)"></span>UBS</button>
        </div>
      </div>

      <div class="rank-section">
        <div class="rank-hdr">
          <span class="rank-title" id="rank-title">Ranking</span>
          <div class="sort-row">
            <button class="sbtn on" id="sw" onclick="setSort('wait')">Espera</button>
            <button class="sbtn" id="sq" onclick="setSort('queue')">Fila</button>
          </div>
        </div>
        <div class="rank-list" id="unit-list"></div>
        <div class="pgn" id="pgn"></div>
      </div>

    </div>
  </aside>

  <!-- MAPA REAL -->
  <div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const UNITS = [
  {c:"2081399",n:"Hospital das Clínicas Unicamp",      t:"HOSPITAL GERAL",                    nat:"Estadual", lat:-22.8850,lng:-47.0660,u:"Sim"},
  {c:"2077760",n:"Hospital Municipal Mario Gatti",      t:"HOSPITAL GERAL",                    nat:"Municipal",lat:-22.9100,lng:-47.0650,u:"Sim"},
  {c:"2077884",n:"Hospital da Mulher Pinotti",          t:"HOSPITAL ESPECIALIZADO",             nat:"Estadual", lat:-22.8960,lng:-47.0550,u:"Sim"},
  {c:"3153140",n:"CAISM Unicamp",                       t:"HOSPITAL ESPECIALIZADO",             nat:"Estadual", lat:-22.8880,lng:-47.0680,u:"Sim"},
  {c:"2079087",n:"Hospital Estadual de Sumaré",         t:"HOSPITAL GERAL",                    nat:"Estadual", lat:-22.8200,lng:-47.2600,u:"Sim"},
  {c:"6883841",n:"UPA 24h Anchieta",                    t:"UNIDADE DE PRONTO ATENDIMENTO",      nat:"Municipal",lat:-22.9500,lng:-47.1200,u:"Sim"},
  {c:"6883922",n:"UPA 24h Campo Grande",                t:"UNIDADE DE PRONTO ATENDIMENTO",      nat:"Municipal",lat:-22.9350,lng:-47.1050,u:"Sim"},
  {c:"6657432",n:"UPA 24h Sousas",                      t:"UNIDADE DE PRONTO ATENDIMENTO",      nat:"Municipal",lat:-22.8750,lng:-46.9800,u:"Sim"},
  {c:"6657521",n:"UPA 24h Ouro Verde",                  t:"UNIDADE DE PRONTO ATENDIMENTO",      nat:"Municipal",lat:-22.9800,lng:-47.1500,u:"Sim"},
  {c:"2077558",n:"CS Barão Geraldo",                    t:"CENTRO DE SAUDE / UBS",              nat:"Municipal",lat:-22.8400,lng:-47.0680,u:"Não"},
  {c:"2077590",n:"CS DIC III",                          t:"CENTRO DE SAUDE / UBS",              nat:"Municipal",lat:-22.9650,lng:-47.1380,u:"Não"},
  {c:"2077647",n:"CS Jardim das Bandeiras",             t:"CENTRO DE SAUDE / UBS",              nat:"Municipal",lat:-22.9220,lng:-47.0820,u:"Não"},
  {c:"2770450",n:"CS Ipaussurama",                      t:"CENTRO DE SAUDE / UBS",              nat:"Municipal",lat:-22.8850,lng:-47.0900,u:"Não"},
  {c:"2077639",n:"CS Capivari",                         t:"CENTRO DE SAUDE / UBS",              nat:"Municipal",lat:-22.9100,lng:-47.0300,u:"Não"},
  {c:"2077818",n:"Ambulatório Ouro Verde",              t:"POLICLINICA",                        nat:"Municipal",lat:-22.9750,lng:-47.1580,u:"Não"},
];

const CFG = {
  hospital:{ color:"#f43f5e", label:"Hospital SUS",  wait:110, cap:80,  qb:65 },
  upa:     { color:"#f59e0b", label:"UPA 24h",        wait:55,  cap:40,  qb:28 },
  ubs:     { color:"#10b981", label:"UBS / Posto",    wait:18,  cap:20,  qb:8  },
  other:   { color:"#8b5cf6", label:"Outro serviço",  wait:28,  cap:25,  qb:12 },
};

function classify(u){
  const t=u.t.toUpperCase();
  if(/HOSPITAL/.test(t)) return "hospital";
  if(/UPA|PRONTO/.test(t)) return "upa";
  if(/BASIC|UBS|SAUDE|CENTRO|POSTO/.test(t)) return "ubs";
  return "other";
}
function hashN(s){ return Math.abs(s.split("").reduce((a,c)=>(((a<<5)-a)+c.charCodeAt(0))|0,0)); }
function fakeWait(u){ const h=hashN(u.c),c=CFG[classify(u)]; return Math.max(5,c.wait+(h%36)-18); }
function fakeQ(u){    const h=hashN(u.c),c=CFG[classify(u)]; return Math.max(1,c.qb+(h%22)-11); }
function fmt(m){ return m<60?m+"min":Math.floor(m/60)+"h"+(m%60?m%60+"min":""); }
function wColor(w){ return w<=30?"#4ade80":w<=80?"#fbbf24":"#f87171"; }
function wClass(w){ return w<=30?"bg":w<=80?"ba":"br"; }

let activeType="all", sortBy="wait", page=0;
const PER=6;
let leafletMarkers=[], mapInstance=null, activeMarkerUnit=null;

// ── MAP INIT ──
function initMap(){
  mapInstance = L.map("map", {
    center: [-22.9099, -47.0626],
    zoom: 12,
    zoomControl: false,
    attributionControl: true,
  });

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 19,
  }).addTo(mapInstance);

  L.control.zoom({ position:"bottomright" }).addTo(mapInstance);
}

// ── CUSTOM MARKER ──
function makeIcon(u){
  const tp=classify(u), c=CFG[tp].color;
  const w=fakeWait(u), wc=wColor(w);
  const q=fakeQ(u);
  const size = tp==="hospital"?38:tp==="upa"?34:28;

  let shape="";
  if(tp==="hospital"){
    shape=`<circle cx="19" cy="19" r="13" fill="${c}" stroke="${wc}" stroke-width="2.5"/>
      <rect x="14" y="17.5" width="10" height="3" rx="1" fill="rgba(255,255,255,0.9)"/>
      <rect x="17.5" y="14" width="3" height="10" rx="1" fill="rgba(255,255,255,0.9)"/>`;
  } else if(tp==="upa"){
    shape=`<rect x="6" y="6" width="26" height="26" rx="5" fill="${c}" stroke="${wc}" stroke-width="2.5"/>
      <text x="19" y="23" text-anchor="middle" font-size="9" font-weight="800" fill="rgba(255,255,255,0.95)" font-family="Inter,sans-serif">24h</text>`;
  } else if(tp==="ubs"){
    shape=`<polygon points="19,5 31,29 7,29" fill="${c}" stroke="${wc}" stroke-width="2"/>`;
  } else {
    shape=`<circle cx="19" cy="19" r="11" fill="${c}" stroke="${wc}" stroke-width="2"/>`;
  }

  // glow ring + queue bubble
  const svg=`<svg width="38" height="38" viewBox="0 0 38 38" xmlns="http://www.w3.org/2000/svg">
    <circle cx="19" cy="19" r="17" fill="${wc}" opacity="0.18"/>
    ${shape}
    <circle cx="28" cy="10" r="8" fill="${wc}"/>
    <text x="28" y="14" text-anchor="middle" font-size="7" font-weight="800" fill="#010409" font-family="Inter,sans-serif">${q>99?"99+":q}</text>
  </svg>`;

  return L.divIcon({
    html: svg,
    iconSize:[38,38],
    iconAnchor:[19,19],
    popupAnchor:[0,-22],
    className:"",
  });
}

function popupHTML(u){
  const w=fakeWait(u), q=fakeQ(u), tp=classify(u), c=CFG[tp];
  const wc=wColor(w);
  return `<div class="popup-inner">
    <div class="popup-name">${u.n}</div>
    <div class="popup-row"><span class="popup-lbl">Tipo</span><span class="popup-val">${u.t}</span></div>
    <div class="popup-row"><span class="popup-lbl">Natureza</span><span class="popup-val">${u.nat}</span></div>
    <div class="popup-row"><span class="popup-lbl">Urgência 24h</span><span class="popup-val">${u.u}</span></div>
    <div class="popup-row"><span class="popup-lbl">CNES</span><span class="popup-val" style="color:#38bdf8">${u.c}</span></div>
    <div class="popup-divider"></div>
    <div class="popup-row">
      <span class="popup-lbl">Espera estimada</span>
      <span class="popup-wait" style="color:${wc}">${fmt(w)}</span>
    </div>
    <div class="popup-row">
      <span class="popup-lbl">Na fila agora</span>
      <span class="popup-val">${q} pessoas</span>
    </div>
  </div>
  <div class="popup-footer">Dados simulados · CNES/DataSUS</div>`;
}

function drawMarkers(){
  leafletMarkers.forEach(m=>m.remove());
  leafletMarkers=[];
  const f=UNITS.filter(u=>activeType==="all"||classify(u)===activeType);
  f.forEach(u=>{
    const m=L.marker([u.lat,u.lng],{icon:makeIcon(u)});
    m.bindPopup(popupHTML(u),{className:"custom-popup",maxWidth:260,minWidth:240});
    m.on("click",()=>{
      document.querySelectorAll(".ri").forEach(el=>el.classList.remove("active-item"));
      const el=document.querySelector(`[data-cnes="${u.c}"]`);
      if(el){ el.classList.add("active-item"); el.scrollIntoView({behavior:"smooth",block:"nearest"}); }
    });
    m.addTo(mapInstance);
    leafletMarkers.push(m);
  });
}

// ── SIDEBAR RENDER ──
function updateMetrics(){
  const f=UNITS.filter(u=>activeType==="all"||classify(u)===activeType);
  const s=[...f].sort((a,b)=>fakeWait(a)-fakeWait(b));
  document.getElementById("m-total").textContent=f.length;
  document.getElementById("m-urg").textContent=f.filter(u=>u.u==="Sim").length;
  if(!s.length) return;
  const best=s[0],worst=s[s.length-1];
  document.getElementById("m-best").textContent=fmt(fakeWait(best));
  document.getElementById("m-best-n").textContent=best.n;
  document.getElementById("m-worst").textContent=fmt(fakeWait(worst));
  document.getElementById("m-worst-n").textContent=worst.n;
  document.getElementById("b-name").textContent=best.n;
  document.getElementById("b-type").textContent=best.t;
  document.getElementById("b-wait").textContent=fmt(fakeWait(best));
  document.getElementById("b-queue").textContent=fakeQ(best)+" pessoas";
}

function renderList(){
  const f=UNITS.filter(u=>activeType==="all"||classify(u)===activeType);
  const s=[...f].sort((a,b)=>sortBy==="wait"?fakeWait(a)-fakeWait(b):fakeQ(a)-fakeQ(b));
  const start=page*PER, slice=s.slice(start,start+PER);
  const totalPages=Math.ceil(s.length/PER);

  document.getElementById("rank-title").textContent=`${s.length} unidades — por ${sortBy==="wait"?"espera":"fila"}`;

  document.getElementById("unit-list").innerHTML=slice.map((u,i)=>{
    const tp=classify(u), c=CFG[tp];
    const w=fakeWait(u), q=fakeQ(u), wc=wColor(w);
    const occ=Math.min(100,Math.round(q/c.cap*100));
    const iconSvg=tp==="hospital"
      ?`<circle cx="10" cy="10" r="8" fill="${c.color}"/><rect x="6.5" y="8.5" width="7" height="3" rx=".5" fill="rgba(255,255,255,.9)"/><rect x="8.5" y="6.5" width="3" height="7" rx=".5" fill="rgba(255,255,255,.9)"/>`
      :tp==="upa"
      ?`<rect x="2" y="2" width="16" height="16" rx="3" fill="${c.color}"/><text x="10" y="13" text-anchor="middle" font-size="5.5" font-weight="800" fill="rgba(255,255,255,.9)" font-family="Inter,sans-serif">24h</text>`
      :tp==="ubs"
      ?`<polygon points="10,2 18,17 2,17" fill="${c.color}"/>`
      :`<circle cx="10" cy="10" r="8" fill="${c.color}"/>`;
    return `<div class="ri" data-cnes="${u.c}" onclick="focusUnit('${u.c}')">
      <span class="ri-num">${start+i+1}</span>
      <div class="ri-icon" style="background:${c.color}18;border:1px solid ${c.color}30">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">${iconSvg}</svg>
      </div>
      <div class="ri-info">
        <div class="ri-name">${u.n}</div>
        <div class="ri-sub">${u.t} · ${u.c}</div>
        <div class="occ-bar"><div class="occ-fill" style="width:${occ}%;background:${wc}"></div></div>
      </div>
      <span class="ri-badge ${wClass(w)}">${fmt(w)}</span>
    </div>`;
  }).join("");

  document.getElementById("pgn").innerHTML=totalPages>1
    ?`<button class="pb" onclick="goPage(-1)" ${page===0?"disabled":""}>← Ant.</button>
       <span>${page+1} / ${totalPages}</span>
       <button class="pb" onclick="goPage(1)" ${page>=totalPages-1?"disabled":""}>Próx. →</button>`
    :`<span>${s.length} unidades</span>`;
}

window.focusUnit=function(cnes){
  const u=UNITS.find(x=>x.c===cnes); if(!u) return;
  mapInstance.flyTo([u.lat,u.lng],15,{duration:0.8});
  const m=leafletMarkers.find(mk=>{
    const ll=mk.getLatLng();
    return Math.abs(ll.lat-u.lat)<0.0001&&Math.abs(ll.lng-u.lng)<0.0001;
  });
  if(m) setTimeout(()=>m.openPopup(),850);
  document.querySelectorAll(".ri").forEach(el=>el.classList.remove("active-item"));
  const el=document.querySelector(`[data-cnes="${cnes}"]`);
  if(el) el.classList.add("active-item");
};

window.goPage=d=>{
  const f=UNITS.filter(u=>activeType==="all"||classify(u)===activeType);
  const t=Math.ceil(f.length/PER);
  page=Math.max(0,Math.min(page+d,t-1));
  renderList();
};

window.setSort=v=>{
  sortBy=v; page=0;
  document.getElementById("sw").classList.toggle("on",v==="wait");
  document.getElementById("sq").classList.toggle("on",v==="queue");
  renderList();
};

document.getElementById("filters").addEventListener("click",e=>{
  const btn=e.target.closest("[data-t]"); if(!btn) return;
  activeType=btn.dataset.t; page=0;
  document.querySelectorAll(".fbtn").forEach(b=>b.classList.toggle("on",b.dataset.t===activeType));
  updateMetrics(); drawMarkers(); renderList();
});

function updateClock(){
  document.getElementById("clock").textContent=new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
}

// ── START ──
initMap();
updateClock();
setInterval(updateClock,30000);
setInterval(()=>{ drawMarkers(); updateMetrics(); renderList(); },12000);
drawMarkers();
updateMetrics();
renderList();
</script>
</body>
</html>
